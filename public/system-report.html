<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>System Team Monthly Closing Report</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
:root{
  --bg:#f6f5f0;--card:#fff;--border:#e8e6df;
  --text:#1a1a18;--muted:#73726c;--hint:#a3a29c;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --teal:#0F6E56;--teal-bg:#E1F5EE;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --radius:10px;
  --font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:var(--font);background:#b2b1ac;color:var(--text);font-size:15px;font-weight:300;line-height:1.6;letter-spacing:-0.2px}
button,input,textarea,select,[contenteditable]{font-family:inherit;color:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* ── App bar ── */
.appbar{position:sticky;top:0;z-index:50;background:#1a1a18;color:#fff;border-bottom:1px solid #000}
.appbar-inner{max-width:1100px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px}
.brand-logo{font-size:18px;font-weight:700;letter-spacing:-0.5px;color:#FFC000}
.brand-sub{font-size:11px;font-weight:400;color:#B0B0B0;letter-spacing:0}
.bar-spacer{flex:1}
.btn{padding:7px 12px;border-radius:6px;border:1px solid #444;background:#2a2a28;color:#eee;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s;min-height:34px}
.btn:hover{background:#3a3a36;border-color:#666}
.btn.primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn.primary:hover{background:#4239a0}
.mode-toggle{display:inline-flex;background:#2a2a28;border:1px solid #444;border-radius:6px;overflow:hidden}
.mode-toggle button{padding:7px 14px;font-size:12px;font-weight:600;background:transparent;color:#aaa;border:0;min-height:34px}
.mode-toggle button.on{background:#FFC000;color:#1a1a18}

/* ── Page (landscape A4 paper appearance) ── */
.page{max-width:1160px;margin:24px auto;padding:20px 32px 44px;background:#fff;border-radius:6px;box-shadow:0 4px 28px rgba(0,0,0,0.22)}

/* ── Paper chrome — matches Error Report purple header ── */
.paper-chrome{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:7px;margin-bottom:20px;border-bottom:2px solid var(--purple)}
.paper-chrome .pc-brand{font-size:11px;font-weight:700;color:var(--purple);letter-spacing:0.04em;text-transform:uppercase}
.paper-chrome .pc-center{font-size:10px;color:var(--muted);display:flex;gap:5px;align-items:center}
.paper-chrome .pc-right{font-size:10px;color:var(--muted)}

/* ── Report header ── */
.report-head{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;margin-bottom:18px}
.rh-title{font-size:22px;font-weight:700;letter-spacing:-0.6px;line-height:1.3;color:var(--text);margin-bottom:2px}
.rh-subtitle{font-size:11px;font-weight:500;color:var(--purple);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:0}
.rh-meta{display:flex;flex-wrap:wrap;gap:22px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.rh-meta-item{display:flex;flex-direction:column;gap:4px;min-width:130px}
.rh-meta-lbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase}
.rh-meta-val{font-size:15px;font-weight:500;color:var(--text);letter-spacing:-0.2px;outline:none;min-width:80px;min-height:22px;border-bottom:1px solid transparent;transition:border-color .15s}
.rh-meta-val[contenteditable=true]:hover{border-bottom-color:var(--border)}
.rh-meta-val[contenteditable=true]:focus{border-bottom-color:var(--purple);background:var(--purple-bg);border-radius:4px 4px 0 0;padding:2px 6px;margin:-2px -6px 0}

/* ── Groups ── */
.group{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.group-head{display:flex;align-items:center;gap:10px;padding:14px 22px;background:#1a1a18;color:#fff;border-bottom:1px solid #000;position:relative}
.group-num{font-size:15px;font-weight:700;color:#FFC000;min-width:24px}
.group-title{font-size:17px;font-weight:600;letter-spacing:-0.4px;flex:1;outline:none}
.group-title[contenteditable=true]:focus{background:rgba(255,255,255,0.1);border-radius:4px;padding:2px 6px;margin:-2px -6px}
.group-body{padding:8px 0}
.group-actions{display:flex;gap:5px;flex-shrink:0}
.group-actions button{width:26px;height:26px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.06);color:#ddd;border-radius:5px;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;min-height:26px;padding:0;font-weight:600}
.group-actions button:hover{background:rgba(255,255,255,0.18);color:#fff}
.group-actions .danger:hover{background:rgba(255,107,107,0.25);color:#FF6B6B;border-color:rgba(255,107,107,0.5)}

/* ── Blocks ── */
.block{padding:18px 22px;border-bottom:1px solid var(--border)}
.block:last-child{border-bottom:none}
.block-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.block-num{font-size:14px;font-weight:700;color:var(--purple);flex-shrink:0;padding-top:1px;min-width:32px}
.block-title{flex:1;font-size:16px;font-weight:600;letter-spacing:-0.3px;outline:none}
.block-title[contenteditable=true]:focus{background:var(--purple-bg);border-radius:4px;padding:2px 8px;margin:-2px -8px}
.block-actions{display:flex;gap:4px;flex-shrink:0}
.block-actions button{width:24px;height:24px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:4px;font-size:11px;line-height:1;min-height:24px;padding:0;display:flex;align-items:center;justify-content:center}
.block-actions button:hover{background:var(--purple-bg);color:var(--purple);border-color:var(--purple)}
.block-actions .danger:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.add-block{display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 44px);margin:6px 22px 14px;padding:11px;font-size:13px;font-weight:500;color:var(--muted);background:transparent;border:1px dashed var(--border);border-radius:6px}
.add-block:hover{background:var(--purple-bg);color:var(--purple);border-color:var(--purple);border-style:solid}

/* ── Items (bullets) ── */
.items{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.item{display:flex;gap:10px;padding:8px 10px;border-radius:6px;background:#fafaf7;border:1px solid var(--border);align-items:flex-start}
.item-bullet{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--purple-bg);color:var(--purple);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.item-text{flex:1;font-size:14.5px;line-height:1.65;letter-spacing:-0.2px;outline:none;min-height:22px;word-break:keep-all;overflow-wrap:anywhere}
.item-text[contenteditable=true]:focus{background:#fff;box-shadow:0 0 0 2px var(--purple-bg);border-radius:4px;padding:2px 4px;margin:-2px -4px}
.item-del{flex-shrink:0;width:22px;height:22px;border:none;background:transparent;color:var(--muted);font-size:14px;border-radius:4px;display:none;align-items:center;justify-content:center;padding:0}
.item:hover .item-del{display:flex}
.item-del:hover{background:var(--red-bg);color:var(--red)}
.add-item{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:13px;font-weight:500;color:var(--purple);background:var(--purple-bg);border:1px dashed var(--purple);border-radius:6px}
.add-item:hover{background:var(--purple);color:#fff;border-style:solid}

/* ── Gallery ── */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:10px}
.gallery-item{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:#f0efe9;aspect-ratio:4/3}
.gallery-item img{width:100%;height:100%;object-fit:cover;cursor:zoom-in}
.gallery-item .img-del{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.65);color:#fff;border:none;font-size:14px;display:none;align-items:center;justify-content:center}
.gallery-item:hover .img-del{display:flex}
.dropzone{border:2px dashed var(--border);border-radius:8px;padding:22px;text-align:center;background:#fafaf7;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;aspect-ratio:4/3;justify-content:center}
.dropzone:hover,.dropzone.over{border-color:var(--purple);background:var(--purple-bg);color:var(--purple)}
.dropzone .dz-ic{font-size:28px;opacity:0.7}

/* ── Add section ── */
.add-section-wrap{max-width:1160px;margin:0 auto 20px;padding:0}
.add-section-btn{width:100%;padding:14px;font-size:14px;font-weight:500;color:var(--muted);background:transparent;border:1px dashed var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;gap:8px}
.add-section-btn:hover{background:var(--purple-bg);color:var(--purple);border-color:var(--purple);border-style:solid}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:11px 20px;border-radius:6px;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.on{opacity:1}

/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;cursor:zoom-out}
.lightbox.on{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:6px}
.lb-close{position:absolute;top:20px;right:24px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;border:none;font-size:20px}

/* ── Footer ── */
.footer{text-align:center;padding:24px 0 8px;color:var(--hint);font-size:12px}

/* ── View mode ── */
body.mode-view .group-actions,
body.mode-view .block-actions,
body.mode-view .item-del,
body.mode-view .add-item,
body.mode-view .add-block,
body.mode-view .dropzone,
body.mode-view .add-section-wrap{display:none!important}
body.mode-view [contenteditable]{pointer-events:none}
body.mode-view .item:hover .item-del{display:none!important}
body.mode-view .rh-meta-val{border-bottom-color:transparent!important}

/* ── Fixed running header — visible only in print, repeats every page ── */
.print-run-head{display:none}

/* ── Print — A4 landscape, zero margins (matches Error Report output) ── */
@media print{
  @page{size:A4 landscape;margin:32px 0 22px}
  body{background:#fff!important}
  .appbar,.add-section-wrap,.add-block,.add-item,.group-actions,.block-actions,.item-del,.dropzone,.toast,.lightbox,.footer{display:none!important}
  /* Hide the in-flow paper-chrome; the fixed print-run-head covers all pages */
  .paper-chrome{display:none!important}
  /* Running header — fixed to top of every printed page */
  .print-run-head{
    display:flex!important;position:fixed;top:0;left:0;right:0;
    justify-content:space-between;align-items:flex-end;
    padding:4px 12mm 5px;
    border-bottom:2px solid var(--purple);
    background:#fff;z-index:999;
    font-size:9pt;
  }
  .print-run-head .prc-brand{font-weight:700;color:var(--purple);letter-spacing:0.04em;text-transform:uppercase;font-size:8pt}
  .print-run-head .prc-center{color:var(--muted);font-size:8pt}
  .print-run-head .prc-right{color:var(--muted);font-size:8pt}
  .page{max-width:none;margin:0;padding:6mm 12mm 4mm;box-shadow:none!important;border-radius:0!important}
  /* Section header never orphaned at page bottom */
  .group-head{break-after:avoid;page-break-after:avoid}
  /* Each block (1.1, 1.2…) stays intact on same page */
  .block{break-inside:avoid;page-break-inside:avoid}
  .group{margin-bottom:10px}
}
</style>
</head>

<script>
(function(){
'use strict';

// ── URL params ────────────────────────────────────────────────
var params = new URLSearchParams(location.search);
var BRANCH = (params.get('branch')||'').toUpperCase() || 'AMXX';
var MONTH_IDX = parseInt(params.get('month') || '');
if(isNaN(MONTH_IDX) || MONTH_IDX < 0 || MONTH_IDX > 11) MONTH_IDX = new Date().getMonth();
var YEAR = parseInt(params.get('year') || '') || new Date().getFullYear();
var INIT_LANG   = params.get('lang')   === 'ko' ? 'ko' : 'en';
var INIT_MODE   = params.get('mode')   === 'view' ? 'view' : 'edit';
var INIT_ACTION = params.get('action') || '';

var MONTHS_EN  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_KO  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

// Site names — EN branches use EN, KO branches use Korean
var SITE_NAMES = {
  AMNY:'Arte Museum New York',
  AMLV:'Arte Museum Las Vegas',
  AMDB:'Arte Museum Dubai',
  AMGN:'아르떼뮤지엄 강릉',
  AMYS:'아르떼뮤지엄 여수',
  AMBS:'아르떼뮤지엄 부산',
  AMJJ:'아르떼뮤지엄 제주',
};
var KO_BRANCHES = ['AMGN','AMYS','AMBS','AMJJ'];
var IS_KO_BRANCH = KO_BRANCHES.indexOf(BRANCH) >= 0;

var TITLE = IS_KO_BRANCH
  ? (SITE_NAMES[BRANCH]||BRANCH) + ' ' + MONTHS_KO[MONTH_IDX] + ' ' + YEAR + '년 시스템팀 월말 마감 보고서'
  : BRANCH + ' ' + MONTHS_EN[MONTH_IDX] + ' ' + YEAR + ' System Team Monthly Closing Report';
var PERIOD_EN = MONTHS_EN[MONTH_IDX] + ' ' + YEAR;
var PERIOD_KO = YEAR + '년 ' + MONTHS_KO[MONTH_IDX];

// Auto-suggest submission date: 1st of next month
var _nextMonthDate = new Date(YEAR, MONTH_IDX + 1, 1);
var AUTO_DATE_EN = MONTHS_EN[_nextMonthDate.getMonth()] + ' 1, ' + _nextMonthDate.getFullYear();
var AUTO_DATE_KO = _nextMonthDate.getFullYear() + '년 ' + (_nextMonthDate.getMonth()+1) + '월 1일';

var SITE_FULL = BRANCH + (SITE_NAMES[BRANCH] ? ' (' + SITE_NAMES[BRANCH] + ')' : '');
var STORAGE_KEY = 'sysrpt_' + BRANCH + '_' + YEAR + '_' + MONTH_IDX;

// ── i18n ─────────────────────────────────────────────────────
var T = {
  en:{
    loadBtn:'Load', htmlBtn:'Save HTML', printBtn:'Print',
    genPdf:'Download PDF', pdfGenerating:'Generating PDF…',
    genImg:'Save Image', imgGenerating:'Saving Image…',
    metaPeriod:'Reporting Period', metaInCharge:'In-Charge',
    metaDate:'Submission Date', metaSite:'Site',
    addSection:'＋ Add new section', addBlock:'＋ Add subsection', addNote:'＋ Add note',
    newSectionEn:'New Section', newSectionKo:'새 섹션',
    newBlockEn:'New Subsection',  newBlockKo:'새 소목차',
    moveUp:'↑', moveDown:'↓', del:'✕',
    footer:"Generated with d'strict System Report Template · Save HTML for a shareable single-file document",
    langBtn:'한국어', htmlSaved:'Saved as HTML', loaded:'Loaded',
    confirmDel:'Delete this section?', confirmDelBlock:'Delete this subsection?',
    dropImages:'Drop images here', orClick:'or click to browse',
  },
  ko:{
    loadBtn:'불러오기', htmlBtn:'HTML 저장', printBtn:'인쇄',
    genPdf:'PDF 다운로드', pdfGenerating:'PDF 생성 중…',
    genImg:'이미지 저장', imgGenerating:'이미지 생성 중…',
    metaPeriod:'보고 기간', metaInCharge:'담당자',
    metaDate:'제출일', metaSite:'현장',
    addSection:'＋ 섹션 추가', addBlock:'＋ 소목차 추가', addNote:'＋ 항목 추가',
    newSectionEn:'New Section', newSectionKo:'새 섹션',
    newBlockEn:'New Subsection',  newBlockKo:'새 소목차',
    moveUp:'↑', moveDown:'↓', del:'✕',
    footer:"d'strict 시스템 리포트 템플릿으로 생성 · HTML 저장으로 단일 파일 공유",
    langBtn:'English', htmlSaved:'HTML로 저장되었습니다', loaded:'불러오기 완료',
    confirmDel:'이 섹션을 삭제하시겠습니까?', confirmDelBlock:'이 소목차를 삭제하시겠습니까?',
    dropImages:'이미지를 여기에 드래그하세요', orClick:'또는 클릭하여 선택',
  }
};
var lang = IS_KO_BRANCH ? 'ko' : INIT_LANG;
function t(k){ return (T[lang]||T.en)[k] || k; }

// ── Bilingual title helpers ───────────────────────────────────
function getGroupTitle(g){
  return lang === 'ko' ? (g.titleKo || g.titleEn || '') : (g.titleEn || g.titleKo || '');
}
function getBlockTitle(b){
  return lang === 'ko' ? (b.titleKo || b.titleEn || '') : (b.titleEn || b.titleKo || '');
}

// ── Default groups (bilingual, user-editable) ─────────────────

// ── Branch re-deriver (called when BRANCH is recovered from saved state) ──
function _rederiveBranchVars(){
  IS_KO_BRANCH = KO_BRANCHES.indexOf(BRANCH) >= 0;
  TITLE = IS_KO_BRANCH
    ? (SITE_NAMES[BRANCH]||BRANCH) + ' ' + MONTHS_KO[MONTH_IDX] + ' ' + YEAR + '년 시스템팀 월말 마감 보고서'
    : BRANCH + ' ' + MONTHS_EN[MONTH_IDX] + ' ' + YEAR + ' System Team Monthly Closing Report';
  SITE_FULL = BRANCH + (SITE_NAMES[BRANCH] ? ' (' + SITE_NAMES[BRANCH] + ')' : '');
  STORAGE_KEY = 'sysrpt_' + BRANCH + '_' + YEAR + '_' + MONTH_IDX;
  lang = IS_KO_BRANCH ? 'ko' : INIT_LANG;
}

// ── State ─────────────────────────────────────────────────────
var state = {
  branch: BRANCH,
  meta:{ period: PERIOD_EN, inCharge:'', date: AUTO_DATE_EN, site: SITE_FULL },
  groups: JSON.parse(JSON.stringify(DEFAULT_GROUPS)),
};

// Migrate old single-lang `title` field to bilingual `titleEn`/`titleKo`
function migrateGroups(groups){
  return (groups||[]).map(function(g){
    if(!g.titleEn && !g.titleKo){ g.titleEn = g.title || ''; g.titleKo = g.title || ''; }
    delete g.title;
    g.blocks = (g.blocks||[]).map(function(b){
      if(!b.titleEn && !b.titleKo){ b.titleEn = b.title || ''; b.titleKo = b.title || ''; }
      delete b.title;
      return b;
    });
    return g;
  });
}
// Migrate old `author` field → `inCharge`
function migrateMeta(meta){
  if(!meta.inCharge && meta.author){ meta.inCharge = meta.author; }
  delete meta.author;
  return meta;
}

// Recover branch from state if URL had no branch param (e.g. saved HTML opened locally)
function _tryRecoverBranch(s){
  if((BRANCH === 'AMXX' || !BRANCH) && s.branch && s.branch !== 'AMXX'){
    BRANCH = s.branch.toUpperCase();
    _rederiveBranchVars();
  }
}

// Try loading saved state (embedded HTML or localStorage)
(function loadInitial(){
  try{
    var emb = JSON.parse(document.getElementById('savedState').textContent||'{}');
    if(emb && emb.groups && emb.groups.length){
      emb.groups = migrateGroups(emb.groups);
      if(emb.meta) emb.meta = migrateMeta(emb.meta);
      state = emb;
      _tryRecoverBranch(emb);
      return;
    }
  }catch(e){}
  try{
    var stored = localStorage.getItem(STORAGE_KEY);
    if(stored){
      var parsed = JSON.parse(stored);
      if(parsed && parsed.groups){
        parsed.groups = migrateGroups(parsed.groups);
        if(parsed.meta) parsed.meta = migrateMeta(parsed.meta);
        state = parsed;
        _tryRecoverBranch(parsed);
        // If branch changed, STORAGE_KEY changed — try re-reading with correct key
        if(parsed.branch && parsed.branch !== 'AMXX' && STORAGE_KEY !== 'sysrpt_AMXX_'+YEAR+'_'+MONTH_IDX){
          try{
            var stored2 = localStorage.getItem(STORAGE_KEY);
            if(stored2){
              var p2 = JSON.parse(stored2);
              if(p2 && p2.groups){ p2.groups=migrateGroups(p2.groups); if(p2.meta) p2.meta=migrateMeta(p2.meta); state=p2; }
            }
          }catch(e2){}
        }
      }
    }
  }catch(e){}
})();

// ── Utils ─────────────────────────────────────────────────────
var _toastTimer;
function toast(msg){
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('on');
  clearTimeout(_toastTimer); _toastTimer=setTimeout(function(){el.classList.remove('on');},2000);
}

// ── Persist ───────────────────────────────────────────────────
var _saveTimer;
function scheduleSave(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){ syncMetaFromDom(); _doSave(); }, 600);
}
function _doSave(){
  state.branch = BRANCH; // always keep branch in sync
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function syncMetaFromDom(){
  ['period','inCharge','date','site'].forEach(function(f){
    var id = 'meta' + f.charAt(0).toUpperCase() + f.slice(1);
    var el = document.getElementById(id);
    if(el) state.meta[f] = el.textContent;
  });
}

// ── Render ────────────────────────────────────────────────────

  document.title = TITLE;
  document.getElementById('rhTitle').textContent = TITLE;

  // Paper chrome (screen) + print running header
  var brDisp  = BRANCH !== 'AMXX' ? BRANCH : 'd\'strict GTO';
  var perDisp = lang === 'ko' ? PERIOD_KO : PERIOD_EN;
  var siteDisp = SITE_NAMES[BRANCH] || BRANCH;
  var centerDisp = brDisp + ' · ' + perDisp + ' · ' + (lang === 'ko' ? '시스템팀 월말 마감 보고서' : 'System Team Monthly Closing Report');
  var pcBranch = document.getElementById('pcBranch');
  if(pcBranch) pcBranch.textContent = brDisp;
  var pcPeriod = document.getElementById('pcPeriod');
  if(pcPeriod) pcPeriod.textContent = perDisp;
  var pcSite = document.getElementById('pcSite');
  if(pcSite) pcSite.textContent = siteDisp;
  var prcCenter = document.getElementById('prcCenter');
  if(prcCenter) prcCenter.textContent = centerDisp;
  var prcRight = document.getElementById('prcRight');
  if(prcRight) prcRight.textContent = siteDisp;

  // Meta values (only update if not focused)
  _setMeta('metaPeriod',   'period');
  _setMeta('metaInCharge', 'inCharge');
  _setMeta('metaDate',     'date');
  _setMeta('metaSite',     'site');

  // i18n labels
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent = t(el.dataset.i18n);
  });
  document.getElementById('btnLangLbl').textContent = t('langBtn');
  document.documentElement.lang = lang;

  // Groups
  var container = document.getElementById('groups');
  container.innerHTML = '';
  state.groups.forEach(function(g, gi){ container.appendChild(renderGroup(g, gi)); });
}

function _setMeta(id, field){
  var el = document.getElementById(id);
  if(el && !el._focused) el.textContent = state.meta[field] || '';
}

function renderGroup(g, gi){
  var div = document.createElement('div');
  div.className = 'group'; div.id = 'g'+gi;

  var head = document.createElement('div');
  head.className = 'group-head';
  head.innerHTML = '<span class="group-num">'+(gi+1)+'.</span>';

  var titleEl = document.createElement('span');
  titleEl.className = 'group-title';
  titleEl.contentEditable = 'true';
  titleEl.textContent = getGroupTitle(g);
  titleEl.oninput = function(){
    if(lang === 'ko') g.titleKo = this.textContent;
    else              g.titleEn = this.textContent;
    scheduleSave();
  };
  head.appendChild(titleEl);

  var acts = document.createElement('div');
  acts.className = 'group-actions';
  if(gi > 0) acts.appendChild(mkBtn('↑', function(){ moveGroup(gi,-1); }));
  if(gi < state.groups.length-1) acts.appendChild(mkBtn('↓', function(){ moveGroup(gi,1); }));
  mkDangerBtn('✕', function(){ deleteGroup(gi); }, acts);
  head.appendChild(acts);
  div.appendChild(head);

  var body = document.createElement('div');
  body.className = 'group-body';
  g.blocks.forEach(function(b, bi){ body.appendChild(renderBlock(b, g, gi, bi)); });

  var addBlockBtn = document.createElement('button');
  addBlockBtn.className = 'add-block';
  addBlockBtn.textContent = t('addBlock');
  addBlockBtn.onclick = function(){ addBlock(gi); };
  body.appendChild(addBlockBtn);

  div.appendChild(body);
  return div;
}

function renderBlock(b, g, gi, bi){
  var div = document.createElement('div');
  div.className = 'block';

  var head = document.createElement('div');
  head.className = 'block-head';
  head.innerHTML = '<span class="block-num">'+(gi+1)+'.'+(bi+1)+'</span>';

  var titleEl = document.createElement('span');
  titleEl.className = 'block-title';
  titleEl.contentEditable = 'true';
  titleEl.textContent = getBlockTitle(b);
  titleEl.oninput = function(){
    if(lang === 'ko') b.titleKo = this.textContent;
    else              b.titleEn = this.textContent;
    scheduleSave();
  };
  head.appendChild(titleEl);

  var acts = document.createElement('div');
  acts.className = 'block-actions';
  if(bi > 0) acts.appendChild(mkBtn('↑', function(){ moveBlock(gi,bi,-1); }));
  if(bi < g.blocks.length-1) acts.appendChild(mkBtn('↓', function(){ moveBlock(gi,bi,1); }));
  mkDangerBtn('✕', function(){ deleteBlock(gi,bi); }, acts);
  head.appendChild(acts);
  div.appendChild(head);

  if(!b.items) b.items = [];
  var itemsEl = document.createElement('div');
  itemsEl.className = 'items';
  b.items.forEach(function(item, ii){ itemsEl.appendChild(renderItem(item, b, gi, bi, ii)); });
  div.appendChild(itemsEl);

  var addBtn = document.createElement('button');
  addBtn.className = 'add-item';
  addBtn.textContent = t('addNote');
  addBtn.onclick = function(){ addItem(gi, bi); };
  div.appendChild(addBtn);

  if(!b.images) b.images = [];
  div.appendChild(renderGallery(b, gi, bi));
  return div;
}

function renderItem(item, b, gi, bi, ii){
  var row = document.createElement('div');
  row.className = 'item';

  var bullet = document.createElement('span');
  bullet.className = 'item-bullet';
  bullet.textContent = ii+1;
  row.appendChild(bullet);

  var textEl = document.createElement('span');
  textEl.className = 'item-text';
  textEl.contentEditable = 'true';
  // Use innerHTML so \n chars are rendered as visible line breaks
  var _itemTxt = typeof item === 'string' ? item : (item.text || '');
  textEl.innerHTML = _itemTxt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
  // innerText correctly captures <br> as \n when reading back
  textEl.oninput = function(){
    b.items[ii] = this.innerText.replace(/\n$/, '');
    scheduleSave();
  };
  textEl.onblur  = function(){ if(!this.innerText.trim()){ deleteItem(gi,bi,ii); } };
  row.appendChild(textEl);

  var del = document.createElement('button');
  del.className = 'item-del'; del.textContent = '✕'; del.title = t('del');
  del.onclick = function(){ deleteItem(gi,bi,ii); };
  row.appendChild(del);
  return row;
}

function renderGallery(b, gi, bi){
  var wrap = document.createElement('div');
  if(!b.images) b.images = [];
  var grid = document.createElement('div');
  grid.className = 'gallery';

  b.images.forEach(function(img, idx){
    var cell = document.createElement('div');
    cell.className = 'gallery-item';
    var image = document.createElement('img');
    image.src = img.data; image.alt = img.name || '';
    image.onclick = function(){ openLightbox(img.data); };
    cell.appendChild(image);
    var del = document.createElement('button');
    del.className = 'img-del'; del.textContent = '✕';
    del.onclick = function(){ b.images.splice(idx,1); scheduleSave(); renderAll(); };
    cell.appendChild(del);
    grid.appendChild(cell);
  });

  var dz = document.createElement('div');
  dz.className = 'dropzone';
  dz.innerHTML = '<span class="dz-ic">🖼</span><span>'+t('dropImages')+'</span><span style="font-size:11px;color:var(--hint)">'+t('orClick')+'</span>';
  dz.onclick = function(){
    var inp = document.createElement('input');
    inp.type='file'; inp.accept='image/*'; inp.multiple=true;
    inp.onchange = function(){ handleImages(this.files, b, gi, bi); };
    inp.click();
  };
  dz.addEventListener('dragover',  function(e){ e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('over'); });
  dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('over'); handleImages(e.dataTransfer.files, b, gi, bi); });
  grid.appendChild(dz);
  wrap.appendChild(grid);
  return wrap;
}

// ── Image handling — compress before storing to keep POST body small ──
function handleImages(files, b, gi, bi){
  Array.from(files).forEach(function(file){
    if(!file.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        // Resize to max 1400px, encode as JPEG @82% — reduces size ~80%
        var MAX = 1400;
        var w = img.width, h = img.height;
        if(w > MAX || h > MAX){
          var r = Math.min(MAX/w, MAX/h);
          w = Math.round(w*r); h = Math.round(h*r);
        }
        var cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        var data = cv.toDataURL('image/jpeg', 0.82);
        if(!b.images) b.images = [];
        b.images.push({name: file.name.replace(/\.\w+$/, '.jpg'), data: data});
        scheduleSave(); renderAll();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function openLightbox(src){
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('on');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('on');
  document.getElementById('lbImg').src = '';
}

// ── Mutation helpers ──────────────────────────────────────────
function moveGroup(gi, dir){
  var a=state.groups, j=gi+dir;
  if(j<0||j>=a.length) return;
  var tmp=a[gi]; a[gi]=a[j]; a[j]=tmp;
  scheduleSave(); renderAll();
}
function deleteGroup(gi){
  if(!confirm(t('confirmDel'))) return;
  state.groups.splice(gi,1); scheduleSave(); renderAll();
}
function addGroup(){
  state.groups.push({titleEn:t('newSectionEn'), titleKo:t('newSectionKo'), blocks:[]});
  scheduleSave(); renderAll();
  setTimeout(function(){
    var g=document.getElementById('g'+(state.groups.length-1));
    if(g){ var el=g.querySelector('.group-title'); if(el){ el.focus(); _selectAll(el); } }
  }, 50);
}
window.addGroup = addGroup;

function addBlock(gi){
  state.groups[gi].blocks.push({titleEn:t('newBlockEn'), titleKo:t('newBlockKo'), items:[], images:[]});
  scheduleSave(); renderAll();
}
function moveBlock(gi, bi, dir){
  var a=state.groups[gi].blocks, j=bi+dir;
  if(j<0||j>=a.length) return;
  var tmp=a[bi]; a[bi]=a[j]; a[j]=tmp;
  scheduleSave(); renderAll();
}
function deleteBlock(gi, bi){
  if(!confirm(t('confirmDelBlock'))) return;
  state.groups[gi].blocks.splice(bi,1); scheduleSave(); renderAll();
}
function addItem(gi, bi){
  var b=state.groups[gi].blocks[bi];
  if(!b.items) b.items=[];
  b.items.push('');
  scheduleSave(); renderAll();
  setTimeout(function(){
    var g=document.getElementById('g'+gi); if(!g) return;
    var blocks=g.querySelectorAll('.block');
    if(blocks[bi]){ var items=blocks[bi].querySelectorAll('.item-text'); var last=items[items.length-1]; if(last) last.focus(); }
  }, 50);
}
function deleteItem(gi, bi, ii){
  state.groups[gi].blocks[bi].items.splice(ii,1);
  scheduleSave(); renderAll();
}

// ── Utilities ─────────────────────────────────────────────────
function mkBtn(label, onclick){
  var b=document.createElement('button'); b.textContent=label; b.type='button'; b.onclick=onclick; return b;
}
function mkDangerBtn(label, onclick, parent){
  var b=mkBtn(label,onclick); b.classList.add('danger'); if(parent) parent.appendChild(b); return b;
}
function _selectAll(el){
  var r=document.createRange(); r.selectNodeContents(el);
  var s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
}

  if(mP===PERIOD_EN||mP===PERIOD_KO) state.meta.period = lang==='ko'?PERIOD_KO:PERIOD_EN;
  var mD = state.meta.date;
  if(mD===AUTO_DATE_EN||mD===AUTO_DATE_KO) state.meta.date = lang==='ko'?AUTO_DATE_KO:AUTO_DATE_EN;

// ── State snapshot for PDF POST ───────────────────────────────
// Images are now compressed client-side (max 1400px, JPEG 82%) before
// storing, so they're small enough to send. The server template renders
// them via base64 data URLs in Puppeteer.
function stateForPdf(){
  return JSON.parse(JSON.stringify(state));
}

// ── Generate PDF ──────────────────────────────────────────────
async function generatePdf(){
  syncMetaFromDom();
  var btn=document.getElementById('btnGenPdf');
  if(btn){ btn.disabled=true; btn.querySelector('span').textContent=t('pdfGenerating'); }
  try{
    var resp=await fetch('/api/v2/system-monthly',{
      method:'POST',
      credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({state:stateForPdf(), lang:lang, branch:BRANCH, month:MONTH_IDX, year:YEAR}),
    });
    if(!resp.ok){ var err=await resp.json().catch(function(){return{error:'HTTP '+resp.status};}); throw new Error(err.error||'HTTP '+resp.status); }
    var blob=await resp.blob();
    var cd=resp.headers.get('Content-Disposition')||'';
    var fnMatch=cd.match(/filename="([^"]+)"/);
    var fname=fnMatch?fnMatch[1]:(BRANCH+'_System_Monthly_Report.pdf');
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); },3000);
    toast(fname+(lang==='ko'?' 다운로드 완료':' downloaded'));
  }catch(e){
    toast((lang==='ko'?'PDF 생성 실패: ':'PDF failed: ')+e.message);
  }finally{
    if(btn){ btn.disabled=false; btn.querySelector('span').textContent=t('genPdf'); }
  }
}
window.generatePdf = generatePdf;

    setTimeout(function(){ URL.revokeObjectURL(url); },3000);
    toast(fname+(lang==='ko'?' 다운로드 완료':' downloaded'));
  }catch(e){
    toast((lang==='ko'?'이미지 생성 실패: ':'Image failed: ')+e.message);
  }finally{
    if(btn){ btn.disabled=false; btn.querySelector('span').textContent=t('genImg'); }
  }
}
window.generateImg = generateImg;

// ── Save as HTML ──────────────────────────────────────────────
function saveAsHtml(){
  syncMetaFromDom();
  var html=document.documentElement.outerHTML;
  html=html.replace(
    /(<script[^>]*id="savedState"[^>]*>)([\s\S]*?)(<\/script>)/,
    function(m,open,_c,close){ return open+JSON.stringify(state)+close; }
  );
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var fname=BRANCH+'_'+MONTHS_EN[MONTH_IDX]+'_'+YEAR+'_System_Team_Monthly_Closing_Report.html';
  a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); },3000);
  toast(t('htmlSaved'));
}
window.saveAsHtml = saveAsHtml;

// ── Load from file ────────────────────────────────────────────
function loadFromFile(){ document.getElementById('fileLoad').click(); }
window.loadFromFile = loadFromFile;

function handleFileLoad(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var html=e.target.result;
      var match=html.match(/<script[^>]*id="savedState"[^>]*>([\s\S]*?)<\/script>/);
      if(match&&match[1].trim()&&match[1].trim()!=='{}'){
        var loaded=JSON.parse(match[1]);
        if(loaded&&loaded.groups){
          loaded.groups=migrateGroups(loaded.groups);
          if(loaded.meta) loaded.meta=migrateMeta(loaded.meta);
          state=loaded; _doSave(); renderAll(); toast(t('loaded')); return;
        }
      }
      toast('No saved data found in file.');
    }catch(err){ toast('Failed to load: '+err.message); }
  };
  reader.readAsText(file);
  input.value='';
}
window.handleFileLoad = handleFileLoad;

// ── Meta field focus tracking ─────────────────────────────────
['metaPeriod','metaInCharge','metaDate','metaSite'].forEach(function(id){
  var el=document.getElementById(id); if(!el) return;
  el.addEventListener('focus', function(){ el._focused=true; });
  el.addEventListener('blur',  function(){
    el._focused=false;
    var field=el.dataset.field;
    if(field) state.meta[field]=el.textContent;
    scheduleSave();
  });
});

// ── Init ──────────────────────────────────────────────────────
renderAll();
if(INIT_MODE === 'view') setMode('view');
// Auto-download: opened from admin panel with action=download
if(INIT_ACTION === 'download'){
  setTimeout(function(){ generatePdf(); }, 1200);
}
// Email flow: generate PDF then offer email share
if(INIT_ACTION === 'email'){
  setTimeout(function(){ generatePdfAndEmail(); }, 1200);
}

})();
</script>
